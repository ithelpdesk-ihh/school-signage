<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invictus Live Signage</title>

<style>
:root {
  --navy:#0f172a;
  --gold:#f59e0b;
  --accent:#334155;
  --text:#f8fafc;
  --bg:#020617;
}

body,html{
  margin:0;
  padding:0;
  height:100vh;
  width:100vw;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:sans-serif;
}

header{
  height:18vh;
  background:var(--navy);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 40px;
  border-bottom:6px solid var(--gold);
}

.school-name{
  font-size:2.2rem;
  font-weight:900;
}

#time{
  font-size:6rem;
  font-weight:800;
}

#date{
  color:var(--gold);
  font-size:1.8rem;
}

main{
  height:74vh;
  display:grid;
  grid-template-columns:1fr 1.3fr;
  gap:20px;
  padding:20px;
}

.card{
  background:var(--accent);
  border-radius:20px;
  overflow:hidden;
}

.right{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.video-box{
  flex:4;
  background:black;
}

.bottom{
  flex:1.2;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.info{
  background:#fff;
  color:#111;
  padding:15px;
}

iframe,img,video{
  width:100%;
  height:100%;
  object-fit:cover;
  border:none;
}
</style>
</head>

<body>

<header>
  <div class="school-name">
    Invictus International School<br>
    <span style="color:var(--gold);font-size:2.5rem;">Horizon Hills</span>
  </div>

  <div>
    <div id="time">00:00:00</div>
    <div id="date">Loading...</div>
  </div>
</header>

<main>

<!-- IMAGE -->
<div class="card">
  <img id="slideshow">
</div>

<!-- RIGHT SIDE -->
<div class="right">

  <!-- VIDEO -->
  <div class="card video-box">
    <video id="videoPlayer" autoplay muted playsinline preload="auto"></video>
  </div>

  <!-- INFO -->
  <div class="bottom">

    <div class="info" id="notices">
      Loading notices...
    </div>

    <div class="info" id="highlights">
      Loading highlights...
    </div>

  </div>

</div>

</main>

<script>

const API =
  "YOUR_SCRIPT_URL_HERE";

let slideIndex = 0;
let videoIndex = 0;
let slideTimer;
let videoTimer;

/* -----------------------
   CLOCK
------------------------*/
function clock(){
  const now=new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString();
  document.getElementById("date").innerText =
    now.toDateString();
}
setInterval(clock,1000);
clock();

/* -----------------------
   LOAD DATA
------------------------*/
async function load(){

  const res = await fetch(API);
  const data = await res.json();

  /* ---------------- IMAGE SLIDESHOW ---------------- */
  if(data.images?.length){

    const img = document.getElementById("slideshow");
    img.src = data.images[0];

    clearInterval(slideTimer);

    slideTimer = setInterval(()=>{
      slideIndex = (slideIndex + 1) % data.images.length;
      img.src = data.images[slideIndex];
    },8000);
  }

  /* ---------------- VIDEO (GOOGLE DRIVE) ---------------- */
  if(data.videos?.length){

    const video = document.getElementById("videoPlayer");

    function playVideo(i){

      const id = data.videos[i];

      video.pause();
      video.removeAttribute("src");
      video.load();

      video.src =
        `https://drive.google.com/uc?export=download&id=${id}`;

      video.play().catch(()=>{});
    }

    playVideo(videoIndex);

    clearInterval(videoTimer);

    videoTimer = setInterval(()=>{

      videoIndex =
        (videoIndex + 1) % data.videos.length;

      playVideo(videoIndex);

    },60000);
  }

  /* ---------------- TEXT ---------------- */
  document.getElementById("notices").innerHTML =
    (data.notices||[]).map(n=>"▶ "+n).join("<br>");

  document.getElementById("highlights").innerHTML =
    (data.highlights||[]).map(h=>"★ "+h).join("<br>");
}

load();
setInterval(load,300000);

</script>

</body>
</html>
