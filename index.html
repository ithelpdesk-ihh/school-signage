<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invictus Live Signage</title>

<style>

:root {
    --navy: #0f172a;
    --gold: #f59e0b;
    --accent: #334155;
    --text-light: #f8fafc;
    --bg-dark: #020617;
}

/* RESET */
* {
    box-sizing: border-box;
}

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: "Segoe UI", sans-serif;
}

/* HEADER */
header {
    height: 14vh;
    background: var(--navy);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    border-bottom: 5px solid var(--gold);
}

.school-name {
    font-size: 1.7rem;
    font-weight: 900;
}

.clock-container {
    text-align: right;
}

#time {
    font-size: 3.5rem;
    font-weight: 800;
}

#date {
    color: var(--gold);
    font-size: 1.1rem;
}

/* MAIN */
main {
    height: 78vh;
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 15px;
    padding: 15px;
}

.card {
    background: var(--accent);
    border-radius: 16px;
    overflow: hidden;
    min-height: 0;
}

/* LEFT IMAGE */
.poster-box {
    min-height: 0;
}

/* RIGHT COLUMN */
.right-col {
    display: flex;
    flex-direction: column;
    gap: 15px;
    min-height: 0;
}

/* VIDEO */
.video-box {
    flex: 3;
    background: #000;
}

/* LOWER PANELS */
.bottom-split {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    min-height: 0;
}

/* INFO PANEL */
.info-panel {
    position: relative;
    padding: 12px;
    border-radius: 12px;
    overflow: hidden;
    color: white;
}

/* PRIMARY */
.primary-panel {
    background:
    linear-gradient(
        135deg,
        var(--navy) 78%,
        var(--gold) 22%
    );
}

/* SECONDARY */
.secondary-panel {
    background:
    linear-gradient(
        135deg,
        var(--gold) 78%,
        var(--navy) 22%
    );
}

/* TITLES */
.info-panel h2 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 900;
}

/* BLACK LINE */
.panel-divider {
    width: 100%;
    height: 3px;
    background: #000;
    margin: 10px 0;
}

/* SCROLL AREA */
.scroll-container {
    position: relative;
    height: calc(100% - 40px);
    overflow: hidden;
}

.scroll-content {
    position: absolute;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;

    animation: scrollUp 25s linear infinite;
}

@keyframes scrollUp {
    0% {
        transform: translateY(100%);
    }

    100% {
        transform: translateY(-100%);
    }
}

/* BULLETIN */
#news-bar {
    height: 8vh;
    background: var(--gold);
    display: flex;
    align-items: center;
    color: #000;
}

.ticker-label {
    background: var(--navy);
    color: #fff;
    padding: 0 25px;
    height: 100%;
    display: flex;
    align-items: center;
    font-weight: 900;
    font-size: 2rem;
}

.marquee-container {
    flex: 1;
    overflow: hidden;
    position: relative;
}

.marquee {
    display: inline-block;
    white-space: nowrap;
    font-size: 1.7rem;
    font-weight: 700;
    padding-left: 100%;
    animation: scroll linear infinite;
}

@keyframes scroll {
    from {
        transform: translateX(0%);
    }

    to {
        transform: translateX(-100%);
    }
}

/* MEDIA */
iframe, img {
    width: 100%;
    height: 100%;
    border: none;
    object-fit: cover;
}

</style>
</head>

<body>

<header>

<div class="school-name">
Invictus International School<br>
<span style="color: var(--gold); font-size: 2.5rem;">
Horizon Hills
</span>
</div>

<div class="clock-container">
<div id="time">00:00</div>
<div id="date">LOADING...</div>
</div>

</header>

<main>

<!-- LEFT IMAGE -->
<div class="card poster-box">
<img id="slideshow" src="">
</div>

<!-- RIGHT -->
<div class="right-col">

<!-- VIDEO -->
<div class="card video-box">
<iframe
id="yt-player"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>

<!-- PRIMARY + SECONDARY -->
<div class="bottom-split">

<!-- PRIMARY -->
<div class="info-panel primary-panel">

<h2>PRIMARY</h2>

<div class="panel-divider"></div>

<div class="scroll-container">
<div id="campus-updates" class="scroll-content">
Loading...
</div>
</div>

</div>

<!-- SECONDARY -->
<div class="info-panel secondary-panel">

<h2>SECONDARY</h2>

<div class="panel-divider"></div>

<div class="scroll-container">
<div id="student-highlights" class="scroll-content">
Loading...
</div>
</div>

</div>

</div>
</div>

</main>

<!-- BULLETIN -->
<div id="news-bar">

<div class="ticker-label">
BULLETIN
</div>

<div class="marquee-container">
<div id="marquee-text" class="marquee">
Loading...
</div>
</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyhWqhhzjiNfNCLPSPmltgmNH4jkIXJ6PvMfLZtkG079rzBNiYWHhowQrWQeIOweedC/exec";

/* CLOCK */
function clock() {

    const now = new Date();

    document.getElementById("time").innerText =
    now.toLocaleTimeString([], {
        hour:'2-digit',
        minute:'2-digit'
    });

    document.getElementById("date").innerText =
    now.toDateString();
}

/* IMAGE */
let slideshowInterval;

async function refreshImages() {

    try {

        const res = await fetch(API_URL);
        const data = await res.json();

        if (data.images?.length) {

            const img =
            document.getElementById("slideshow");

            let i = 0;

            img.src = data.images[0];

            clearInterval(slideshowInterval);

            slideshowInterval = setInterval(() => {

                i = (i + 1) % data.images.length;

                img.src = data.images[i];

            }, 5000);
        }

    } catch(e) {

        console.log("Image error", e);
    }
}

/* TEXT */
async function refreshText() {

    try {

        const res = await fetch(API_URL);
        const data = await res.json();

        document.getElementById("campus-updates").innerHTML =

        (data.notices || ["No updates"])

        .map(n => `<div>▶ ${n}</div>`)

        .join("");

        document.getElementById("student-highlights").innerHTML =

        (data.highlights || ["No highlights"])

        .map(h => `<div>★ ${h}</div>`)

        .join("");

        /* BULLETIN */
        const el =
        document.getElementById("marquee-text");

        const text =
        data.bulletin || "Welcome";

        el.innerText = text;

        const speed =
        Math.max(12, text.length * 0.3);

        el.style.animationDuration =
        speed + "s";

    } catch(e) {

        console.log("Text error", e);
    }
}

/* YOUTUBE */
let videoLoaded = false;

async function loadYouTube() {

    try {

        if (videoLoaded) return;

        const res = await fetch(API_URL);
        const data = await res.json();

        if (data.videos?.length) {

            const player =
            document.getElementById("yt-player");

            const playlist =
            data.videos.join(",");

            const first =
            data.videos[0];

            player.src =

            `https://www.youtube.com/embed/${first}?autoplay=1&mute=1&controls=0&rel=0&loop=1&playlist=${playlist}`;

            videoLoaded = true;
        }

    } catch(e) {

        console.log("YouTube error", e);
    }
}

/* START */
clock();

setInterval(clock, 1000);

refreshText();
refreshImages();
loadYouTube();

/* REFRESH */
setInterval(refreshText, 20000);
setInterval(refreshImages, 300000);

</script>

</body>
</html>
