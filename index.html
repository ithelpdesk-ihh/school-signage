<style>
:root {
    --navy: #0f172a;
    --gold: #f59e0b;
    --accent: #334155;
    --text-light: #f8fafc;
    --bg-dark: #020617;
}

/* RESET */
* {
    box-sizing: border-box;
}

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden; /* IMPORTANT */
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: "Segoe UI", sans-serif;
}

/* HEADER (FIXED HEIGHT) */
header {
    height: 14vh;
    background: var(--navy);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    border-bottom: 5px solid var(--gold);
}

/* TITLE */
.school-name {
    font-size: 1.7rem;
    font-weight: 900;
    text-transform: uppercase;
}

/* CLOCK */
.clock-container {
    text-align: right;
}

#time {
    font-size: 3.5rem;
    font-weight: 800;
}

#date {
    color: var(--gold);
    font-size: 1.1rem;
}

/* MAIN AREA (STRICT FIT) */
main {
    height: 78vh;   /* IMPORTANT: fixed middle section */
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 15px;
    padding: 15px;
}

/* CARDS */
.card {
    background: var(--accent);
    border-radius: 16px;
    overflow: hidden;
    height: 100%;
}

/* RIGHT COLUMN */
.right-col {
    display: flex;
    flex-direction: column;
    gap: 15px;
    height: 100%;
}

/* VIDEO */
.video-box {
    flex: 3;
    background: #000;
    overflow: hidden;
}

/* TEXT BOTTOM */
.bottom-split {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

/* INFO BOX */
.info-panel {
    padding: 12px;
    background: #fff;
    color: #1e293b;
    border-radius: 12px;
    overflow: hidden;
}

.info-panel h2 {
    margin: 0 0 6px;
    font-size: 1rem;
}

/* NEWS BAR (FIXED HEIGHT) */
#news-bar {
    height: 8vh;
    background: var(--gold);
    display: flex;
    align-items: center;
    color: #000;
}

.ticker-label {
    background: var(--navy);
    color: #fff;
    padding: 0 20px;
    font-weight: 900;
    display: flex;
    align-items: center;
}

.marquee-container {
    flex: 1;
    overflow: hidden;
}

.marquee {
    white-space: nowrap;
    font-size: 1.6rem;
    font-weight: 700;
    padding-left: 100%;
    animation: scroll 35s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* MEDIA FIT */
iframe, img {
    width: 100%;
    height: 100%;
    border: none;
    object-fit: cover;
}
</style>
