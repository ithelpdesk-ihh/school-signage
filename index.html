<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invictus Live Signage</title>
    <style>
        :root {
            --navy: #0f172a;
            --gold: #f59e0b;
            --bg: #020617;
            --white: #f8fafc;
            --soft: #e2e8f0;
        }

        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: "Segoe UI", sans-serif;
            color: var(--white);
        }

        /* HEADER */
        header {
            height: 14vh;
            background: linear-gradient(90deg, var(--navy), #1e293b);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 35px;
            border-bottom: 5px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .school-name {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .school-name span {
            color: var(--gold);
            font-size: 2.6rem;
        }

        .clock-container {
            text-align: right;
        }

        #time {
            font-size: 3.8rem;
            font-weight: 900;
            line-height: 1;
        }

        #date {
            color: var(--gold);
            font-size: 1.1rem;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* MAIN LAYOUT */
        main {
            height: 78vh;
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 16px;
            padding: 16px;
        }

        /* GENERAL CARD */
        .card {
            border-radius: 18px;
            overflow: hidden;
            min-height: 0;
            background: #111827;
            box-shadow: 0 10px 25px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        /* LEFT IMAGE */
        .poster-box {
            position: relative;
            border: 2px solid rgba(255,255,255,0.08);
        }

        /* RIGHT COLUMN */
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
        }

        /* VIDEO */
        .video-box {
            flex: 2.2;
            background: #000;
            border: 2px solid rgba(255,255,255,0.08);
        }

        /* LOWER PANELS */
        .bottom-split {
            flex: 1.6;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            min-height: 0;
        }

        /* PANELS */
        .info-panel {
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            padding: 14px;
            backdrop-filter: blur(6px);
            border: 2px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 20px rgba(0,0,0,0.35);
        }

        /* PRIMARY PANEL */
        .primary-panel {
            background: linear-gradient(145deg, #0f172a 0%, #162238 65%, #f59e0b 100%);
        }

        /* SECONDARY PANEL */
        .secondary-panel {
            background: linear-gradient(145deg, #f59e0b 0%, #d48a08 60%, #0f172a 100%);
        }

        /* PANEL TITLE */
        .panel-header {
            position: relative;
            z-index: 2;
            height: 40px;
        }

        .panel-header h2 {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        /* DIVISION LINE */
        .panel-divider {
            width: 100%;
            height: 4px;
            border-radius: 10px;
            background: linear-gradient(90deg, #000, rgba(0,0,0,0.4));
        }

        /* SCROLL AREA FIXES */
        .scroll-container {
            position: relative;
            height: calc(100% - 40px);
            overflow: hidden;
        }

        /* SMART SCROLL CONTENT */
        .scroll-content {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 600;
        }

        .scroll-content div {
            background: rgba(255,255,255,0.12);
            padding: 10px 12px;
            border-radius: 12px;
            backdrop-filter: blur(3px);
            border-left: 4px solid rgba(255,255,255,0.7);
        }

        /* REWORKED DYNAMIC OVERFLOW SCROLL ANIMATION */
        @keyframes dynamicScrollUp {
            0% { transform: translateY(5px); }
            8% { transform: translateY(5px); }
            92% { transform: translateY(calc(-100% + 140px)); }
            100% { transform: translateY(calc(-100% + 140px)); }
        }

        /* BULLETIN TICKER */
        #news-bar {
            height: 8vh;
            display: flex;
            align-items: center;
            background: var(--gold);
            overflow: hidden;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.35);
        }

        .ticker-label {
            height: 100%;
            background: var(--navy);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 28px;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 1px;
            z-index: 5;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
        }

        .marquee-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .marquee {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            font-size: 1.8rem;
            font-weight: 800;
            color: #000;
            animation: scroll linear infinite;
        }

        @keyframes scroll {
            from { transform: translateX(0%); }
            to { transform: translateX(-100%); }
        }

        /* MEDIA HOOKS */
        iframe, img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }

        .primary-panel::before, .secondary-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 45%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="school-name">
            Invictus International School<br>
            <span>Horizon Hills</span>
        </div>
        <div class="clock-container">
            <div id="time">00:00</div>
            <div id="date">LOADING...</div>
        </div>
    </header>

    <!-- MAIN -->
    <main>
        <!-- LEFT IMAGE SLIDESHOW -->
        <div class="card poster-box">
            <!-- Added a blank inline GIF base64 string to prevent broken image icons before fetch completes -->
            <img id="slideshow" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Signage Poster" />
        </div>

        <!-- RIGHT SIDE -->
        <div class="right-col">
            <!-- VIDEO AREA -->
            <div class="card video-box">
                <iframe id="yt-player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <!-- LOWER DATA PANELS -->
            <div class="bottom-split">
                <!-- PRIMARY CARD -->
                <div class="info-panel primary-panel">
                    <div class="panel-header">
                        <h2>PRIMARY</h2>
                        <div class="panel-divider"></div>
                    </div>
                    <div class="scroll-container">
                        <div id="campus-updates" class="scroll-content">Loading...</div>
                    </div>
                </div>

                <!-- SECONDARY CARD -->
                <div class="info-panel secondary-panel">
                    <div class="panel-header">
                        <h2>SECONDARY</h2>
                        <div class="panel-divider"></div>
                    </div>
                    <div class="scroll-container">
                        <div id="student-highlights" class="scroll-content">Loading...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- BULLETIN TICKER -->
    <div id="news-bar">
        <div class="ticker-label">BULLETIN</div>
        <div class="marquee-container">
            <div id="marquee-text" class="marquee">Loading...</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyhWqhhzjiNfNCLPSPmltgmNH4jkIXJ6PvMfLZtkG079rzBNiYWHhowQrWQeIOweedC/exec";
        
        let slideshowInterval;
        let videoLoaded = false;

        /* RUNTIME CLOCK MECHANISM */
        function clock(){
            const now = new Date();
            document.getElementById("time").innerText = now.toLocaleTimeString([],{ hour:"2-digit", minute:"2-digit" });
            document.getElementById("date").innerText = now.toDateString();
        }

        /* REWRITTEN UNIFIED ARCHITECTURE: Fetches all data in one network request */
        async function refreshSignageEngine() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if (!data) return;

                // 1. Process Slideshow
                if (data.images && data.images.length > 0) {
                    const img = document.getElementById("slideshow");
                    let i = 0;
                    img.src = data.images[0];
                    
                    clearInterval(slideshowInterval);
                    slideshowInterval = setInterval(() => {
                        i = (i + 1) % data.images.length;
                        img.src = data.images[i];
                    }, 5000);
                }

                // 2. Process Primary Panel Text
                const primaryEl = document.getElementById("campus-updates");
                primaryEl.innerHTML = (data.notices || ["No updates"]).map(n => `<div>▶ ${n}</div>`).join("");
                applySmartScrolling(primaryEl);

                // 3. Process Secondary Panel Text
                const secondaryEl = document.getElementById("student-highlights");
                secondaryEl.innerHTML = (data.highlights || ["No highlights"]).map(h => `<div>★ ${h}</div>`).join("");
                applySmartScrolling(secondaryEl);

                // 4. Process Ticker Text 
                const tickerEl = document.getElementById("marquee-text");
                const text = data.bulletin || "Welcome to Invictus International School";
                tickerEl.innerText = text;
                tickerEl.style.animationDuration = Math.max(15, text.length * 0.25) + "s";

                // 5. Process YouTube Stream Engine (Autoplay + Mute Fix Installed Here)
                if (data.videos && data.videos.length > 0 && !videoLoaded) {
                    const player = document.getElementById("yt-player");
                    const firstVideoId = data.videos[0];
                    const fullPlaylistArray = data.videos.join(",");
                    
                    // Added &mute=1 directly into query parameters to unlock mandatory modern browser autoplay rules
                    player.src = `https://www.youtube.com/embed/${firstVideoId}?autoplay=1&mute=1&controls=0&rel=0&loop=1&playlist=${fullPlaylistArray}`;
                    videoLoaded = true;
                }

            } catch (e) {
                console.error("Signage engine data loop failure:", e);
            }
        }

        /* SMART SCROLL FILTER: Only animates vertical text lists if they actually break constraints */
        function applySmartScrolling(element) {
            const viewportBoundaryHeight = element.parentElement.clientHeight;
            const absoluteContentHeight = element.scrollHeight;
            
            if (absoluteContentHeight > viewportBoundaryHeight) {
                // Smooth infinite bounce animation across long text contents
                element.style.animation = "dynamicScrollUp 25s ease-in-out infinite alternate";
            } else {
                element.style.animation = "none";
            }
        }

        /* INITIALIZATION PIPELINE */
        clock();
        setInterval(clock, 1000);
        
        // Single initial execute block
        refreshSignageEngine(); 
        
        // Polling interval syncs data cleanly once every 60 seconds
        setInterval(refreshSignageEngine, 60000);
    </script>
</body>
</html>
