<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Invictus Live Signage</title>

<style>

:root{
    --navy:#0f172a;
    --gold:#f59e0b;
    --bg:#020617;
    --white:#f8fafc;
    --soft:#e2e8f0;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    font-family:"Segoe UI",sans-serif;
    color:var(--white);
}

/* HEADER */
header{
    height:14vh;

    background:
    linear-gradient(
        90deg,
        var(--navy),
        #1e293b
    );

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 35px;

    border-bottom:5px solid var(--gold);

    box-shadow:
    0 4px 15px rgba(0,0,0,0.4);
}

/* BRAND GROUP */
.header-brand-group{
    display:flex;
    align-items:center;
    gap:22px;
    height:100%;
}

/* SCHOOL LOGO */
.school-logo{
    height:70%;
    width:auto;
    object-fit:contain;
}

/* SCHOOL TITLE */
.school-name{
    font-size:1.8rem;
    font-weight:900;
    letter-spacing:1px;
    line-height:1.2;
}

.school-name span{
    color:var(--gold);
    font-size:2.6rem;
}

/* CLOCK */
.clock-container{
    text-align:right;
}

#time{
    font-size:3.8rem;
    font-weight:900;
    line-height:1;
}

#date{
    color:var(--gold);
    font-size:1.1rem;
    margin-top:5px;
    letter-spacing:1px;
}

/* MAIN */
main{
    height:78vh;

    display:grid;

    grid-template-columns:
    1fr 1.6fr;

    gap:16px;

    padding:16px;
}

/* CARD */
.card{
    border-radius:18px;
    overflow:hidden;
    min-height:0;

    background:#111827;

    box-shadow:
    0 10px 25px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

/* POSTER */
.poster-box{
    position:relative;
    border:2px solid rgba(255,255,255,0.08);
    background:#000;
}

/* RIGHT */
.right-col{
    display:flex;
    flex-direction:column;
    gap:16px;
    min-height:0;
}

/* VIDEO */
.video-box{
    flex:2.2;
    background:#000;
    border:2px solid rgba(255,255,255,0.08);
}

/* LOWER */
.bottom-split{
    flex:1.6;

    display:grid;

    grid-template-columns:
    1fr 1fr;

    gap:18px;

    min-height:0;
}

/* PANELS */
.info-panel{
    position:relative;
    overflow:hidden;

    border-radius:18px;

    padding:14px;

    backdrop-filter:blur(6px);

    border:2px solid rgba(255,255,255,0.08);

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 10px 20px rgba(0,0,0,0.35);
}

/* PRIMARY */
.primary-panel{
    background:
    linear-gradient(
        145deg,
        #0f172a 0%,
        #162238 65%,
        #f59e0b 100%
    );
}

/* SECONDARY */
.secondary-panel{
    background:
    linear-gradient(
        145deg,
        #f59e0b 0%,
        #d48a08 60%,
        #0f172a 100%
    );
}

/* PANEL HEADER */
.panel-header{
    position:relative;
    z-index:2;
}

.panel-header h2{
    font-size:1.2rem;
    font-weight:900;
    letter-spacing:1px;
    margin-bottom:10px;
}

/* DIVIDER */
.panel-divider{
    width:100%;
    height:4px;

    border-radius:10px;

    background:
    linear-gradient(
        90deg,
        #000,
        rgba(0,0,0,0.4)
    );

    margin-bottom:12px;
}

/* SCROLL */
.scroll-container{
    position:relative;
    height:calc(100% - 50px);
    overflow:hidden;
}

.scroll-content{
    position:absolute;
    width:100%;

    display:flex;
    flex-direction:column;
    gap:10px;

    font-size:1rem;
    line-height:1.5;
    font-weight:600;

    animation:
    scrollUp 35s linear infinite;
}

.scroll-content div{
    background:rgba(255,255,255,0.12);

    padding:10px 12px;

    border-radius:12px;

    backdrop-filter:blur(3px);

    border-left:
    4px solid rgba(255,255,255,0.7);
}

/* SCROLL ANIMATION */
@keyframes scrollUp{

    0%{
        transform:translateY(100%);
    }

    100%{
        transform:translateY(-100%);
    }
}

/* BULLETIN */
#news-bar{
    height:8vh;

    display:flex;
    align-items:center;

    background:var(--gold);

    overflow:hidden;

    box-shadow:
    0 -4px 15px rgba(0,0,0,0.35);
}

/* LABEL */
.ticker-label{
    height:100%;

    background:var(--navy);
    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:0 28px;

    font-size:2rem;
    font-weight:900;
    letter-spacing:1px;

    box-shadow:
    4px 0 10px rgba(0,0,0,0.3);
}

/* MARQUEE */
.marquee-container{
    flex:1;
    overflow:hidden;
    position:relative;
}

.marquee{
    display:inline-block;

    white-space:nowrap;

    padding-left:100%;

    font-size:1.8rem;
    font-weight:800;

    color:#000;

    animation:
    scroll linear infinite;
}

@keyframes scroll{

    from{
        transform:translateX(0%);
    }

    to{
        transform:translateX(-100%);
    }
}

/* MEDIA */
iframe{
    width:100%;
    height:100%;
    border:none;
}

img{
    width:100%;
    height:100%;

    object-fit:contain;

    background:#000;

    border:none;

    transition:opacity 0.8s ease;
}

/* GLOW */
.primary-panel::before,
.secondary-panel::before{

    content:"";

    position:absolute;
    inset:0;

    background:
    radial-gradient(
        circle at top right,
        rgba(255,255,255,0.18),
        transparent 45%
    );

    pointer-events:none;
}

</style>

</head>

<body>

<!-- HEADER -->
<header>

<div class="header-brand-group">

<!-- GOOGLE DRIVE SCHOOL LOGO -->
<img
class="school-logo"

src="https://drive.google.com/thumbnail?id=1ypVlwlie0XIVA7naS4gsNAVxEu4BAzq4&sz=w1000"

alt="School Logo"
/>

<div class="school-name">

Invictus International School<br>

<span>
Horizon Hills
</span>

</div>

</div>

<!-- CLOCK -->
<div class="clock-container">

<div id="time">
00:00
</div>

<div id="date">
LOADING...
</div>

</div>

</header>

<!-- MAIN -->
<main>

<!-- LEFT -->
<div class="card poster-box">

<img
id="slideshow"

src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
/>

</div>

<!-- RIGHT -->
<div class="right-col">

<!-- VIDEO -->
<div class="card video-box">

<iframe
id="yt-player"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

</div>

<!-- PANELS -->
<div class="bottom-split">

<!-- PRIMARY -->
<div class="info-panel primary-panel">

<div class="panel-header">

<h2>
PRIMARY
</h2>

<div class="panel-divider"></div>

</div>

<div class="scroll-container">

<div
id="campus-updates"
class="scroll-content">

Loading...

</div>

</div>

</div>

<!-- SECONDARY -->
<div class="info-panel secondary-panel">

<div class="panel-header">

<h2>
SECONDARY
</h2>

<div class="panel-divider"></div>

</div>

<div class="scroll-container">

<div
id="student-highlights"
class="scroll-content">

Loading...

</div>

</div>

</div>

</div>

</div>

</main>

<!-- BULLETIN -->
<div id="news-bar">

<div class="ticker-label">
BULLETIN
</div>

<div class="marquee-container">

<div
id="marquee-text"
class="marquee">

Loading...

</div>

</div>

</div>

<script>

/* API */
const API_URL =
"https://script.google.com/macros/s/AKfycbyhWqhhzjiNfNCLPSPmltgmNH4jkIXJ6PvMfLZtkG079rzBNiYWHhowQrWQeIOweedC/exec";

/* CLOCK */
function clock(){

    const now = new Date();

    document.getElementById("time").innerText =

    now.toLocaleTimeString([],{

        hour:"2-digit",
        minute:"2-digit"

    });

    document.getElementById("date").innerText =

    now.toLocaleDateString([],{

        weekday:"long",
        year:"numeric",
        month:"long",
        day:"numeric"

    });
}

/* IMAGE SYSTEM */
let slideshowInterval;

async function refreshImages(){

    try{

        const res =
        await fetch(API_URL);

        const data =
        await res.json();

        if(data.images?.length){

            const img =
            document.getElementById("slideshow");

            /* PRELOAD */
            data.images.forEach(src=>{

                const preload =
                new Image();

                preload.src = src;

            });

            let i = 0;

            img.src =
            data.images[0];

            clearInterval(slideshowInterval);

            slideshowInterval = setInterval(()=>{

                i =
                (i + 1) %
                data.images.length;

                /* FADE OUT */
                img.style.opacity = 0;

                setTimeout(()=>{

                    img.src =
                    data.images[i];

                    /* FADE IN */
                    img.style.opacity = 1;

                },400);

            },5000);

            /* FALLBACK */
            img.onerror = ()=>{

                img.src =
                "https://via.placeholder.com/1920x1080?text=Invictus+Signage";
            };
        }

    }catch(e){

        console.log(
            "Image error",
            e
        );
    }
}

/* TEXT */
async function refreshText(){

    try{

        const res =
        await fetch(API_URL);

        const data =
        await res.json();

        /* PRIMARY */
        document
        .getElementById("campus-updates")
        .innerHTML =

        (data.notices ||
        ["No updates"])

        .map(n =>

            `<div>▶ ${n}</div>`

        )

        .join("");

        /* SECONDARY */
        document
        .getElementById("student-highlights")
        .innerHTML =

        (data.highlights ||
        ["No highlights"])

        .map(h =>

            `<div>★ ${h}</div>`

        )

        .join("");

        /* BULLETIN */
        const el =
        document.getElementById(
            "marquee-text"
        );

        const text =

        data.bulletin ||

        "Welcome to Invictus International School";

        el.innerText = text;

        /* AUTO SPEED */
        const speed =

        Math.max(
            15,
            text.length * 0.35
        );

        el.style.animationDuration =
        speed + "s";

    }catch(e){

        console.log(
            "Text error",
            e
        );
    }
}

/* YOUTUBE */
let videoLoaded = false;

async function loadYouTube(){

    try{

        if(videoLoaded) return;

        const res =
        await fetch(API_URL);

        const data =
        await res.json();

        if(data.videos?.length){

            const player =
            document.getElementById(
                "yt-player"
            );

            const playlist =
            data.videos.join(",");

            const first =
            data.videos[0];

            player.src =

            `https://www.youtube.com/embed/${first}?autoplay=1&mute=1&controls=0&rel=0&loop=1&playlist=${playlist}`;

            videoLoaded = true;
        }

    }catch(e){

        console.log(
            "YouTube error",
            e
        );
    }
}

/* START */
clock();

setInterval(
    clock,
    1000
);

refreshText();

refreshImages();

loadYouTube();

/* AUTO REFRESH */
setInterval(
    refreshText,
    20000
);

setInterval(
    refreshImages,
    300000
);

</script>

</body>
</html>
