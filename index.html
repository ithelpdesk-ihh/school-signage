<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invictus Live Signage</title>
    <style>
        :root {
            --navy: #0f172a;
            --gold: #f59e0b;
            --bg: #020617;
            --white: #f8fafc;
            --soft: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            color: var(--white);
        }

        /* HEADER */
        header {
            height: 14vh;
            background: linear-gradient(90deg, var(--navy), #1e293b);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 5px solid var(--gold);
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }

        .school-name {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .school-name span {
            color: var(--gold);
            font-size: 2.8rem;
        }

        .clock-container {
            text-align: right;
        }

        #time {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1;
        }

        #date {
            color: var(--gold);
            font-size: 1.2rem;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* MAIN LAYOUT */
        main {
            height: 78vh;
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 20px;
            padding: 20px;
        }

        .card {
            border-radius: 20px;
            overflow: hidden;
            min-height: 0;
            background: #111827;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .poster-box {
            position: relative;
            border: 2px solid rgba(255,255,255,0.08);
            background: #090d16;
        }

        .right-col {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
        }

        /* VIDEO - Shrunk from flex:3 to flex:2 */
        .video-box {
            flex: 2;
            background: #000;
            border: 2px solid rgba(255,255,255,0.08);
        }

        /* LOWER PANELS - Expanded from flex:1.3 to flex:2.2 */
        .bottom-split {
            flex: 2.2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            min-height: 0;
        }

        .info-panel {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            padding: 18px;
            border: 2px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 12px 24px rgba(0,0,0,0.4);
        }

        .primary-panel {
            background: linear-gradient(145deg, #0f172a 0%, #162238 70%, #855302 100%);
        }

        .secondary-panel {
            background: linear-gradient(145deg, #b47504 0%, #855302 60%, #0f172a 100%);
        }

        .panel-header {
            position: relative;
            z-index: 2;
        }

        .panel-header h2 {
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .panel-divider {
            width: 100%;
            height: 4px;
            border-radius: 10px;
            background: linear-gradient(90deg, rgba(0,0,0,0.8), rgba(0,0,0,0.1));
            margin-bottom: 14px;
        }

        /* VERTICAL SCROLL ANIMATION */
        .scroll-container {
            position: relative;
            height: calc(100% - 45px);
            overflow: hidden;
        }

        .scroll-content {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 1.1rem;
            line-height: 1.5;
            font-weight: 600;
        }

        .scroll-content div {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px 16px;
            border-radius: 14px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-left: 5px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* TICKER BULLETIN */
        #news-bar {
            height: 8vh;
            display: flex;
            align-items: center;
            background: var(--gold);
            overflow: hidden;
            box-shadow: 0 -6px 25px rgba(0,0,0,0.4);
        }

        .ticker-label {
            height: 100%;
            background: var(--navy);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 35px;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            box-shadow: 6px 0 15px rgba(0,0,0,0.4);
            z-index: 5;
        }

        .marquee-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
        }

        .marquee {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            font-size: 2rem;
            font-weight: 800;
            color: #000;
            will-change: transform;
        }

        @keyframes marqueeLoop {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* MEDIA CONFIGS */
        iframe, img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }

        .info-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.15), transparent 50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="school-name">
            Invictus International School<br>
            <span>Horizon Hills</span>
        </div>
        <div class="clock-container">
            <div id="time">00:00</div>
            <div id="date">LOADING...</div>
        </div>
    </header>

    <!-- MAIN DISPLAY -->
    <main>
        <!-- LEFT POSTER SLIDESHOW -->
        <div class="card poster-box">
            <img id="slideshow" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Signage Screen" />
        </div>

        <!-- RIGHT CONTAINER -->
        <div class="right-col">
            <!-- YOUTUBE VIDEO -->
            <div class="card video-box">
                <iframe id="yt-player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <!-- ANNOUNCEMENT PANELS -->
            <div class="bottom-split">
                <!-- PRIMARY -->
                <div class="info-panel primary-panel">
                    <div class="panel-header">
                        <h2>PRIMARY</h2>
                        <div class="panel-divider"></div>
                    </div>
                    <div class="scroll-container" id="primary-container">
                        <div id="campus-updates" class="scroll-content">Loading updates...</div>
                    </div>
                </div>

                <!-- SECONDARY -->
                <div class="info-panel secondary-panel">
                    <div class="panel-header">
                        <h2>SECONDARY</h2>
                        <div class="panel-divider"></div>
                    </div>
                    <div class="scroll-container" id="secondary-container">
                        <div id="student-highlights" class="scroll-content">Loading highlights...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER BULLETIN TICKER -->
    <div id="news-bar">
        <div class="ticker-label">BULLETIN</div>
        <div class="marquee-container">
            <div id="marquee-text" class="marquee">Connecting to Web Server...</div>
        </div>
    </div>

    <script>
        const API_URL = "google.com";
        
        // Fail-safe fallbacks if the network cuts out
        const fallbackData = {
            images: ["unsplash.com"],
            videos: ["dQw4w9WgXcQ"],
            notices: ["Welcome to Invictus Horizon Hills", "Please check your daily terminal schedule."],
            highlights: ["Strive for excellence!", "Celebrating our students achievements every day."],
            bulletin: "Invictus International School Horizon Hills - Nurturing Next-Generation Leaders."
        };

        let localStore = { ...fallbackData };
        let slideshowIdx = 0;
        let imgTimer = null;
        let videoInitialized = false;

        /* CLOCK DRIVER */
        function updateClock() {
            const now = new Date();
            document.getElementById("time").textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
            document.getElementById("date").textContent = now.toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* UNIFIED APP REFRESH ENGINE */
        async function fetchSignageData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Network status invalid");
                const data = await response.json();
                
                if (data) {
                    localStore.images = data.images?.length ? data.images : fallbackData.images;
                    localStore.videos = data.videos?.length ? data.videos : fallbackData.videos;
                    localStore.notices = data.notices?.length ? data.notices : fallbackData.notices;
                    localStore.highlights = data.highlights?.length ? data.highlights : fallbackData.highlights;
                    localStore.bulletin = data.bulletin || fallbackData.bulletin;
                    
                    renderTextElements();
                    renderSlideshow();
                    renderVideoPlayer();
                }
            } catch (err) {
                console.error("Signage Fetch Failure:", err);
                renderTextElements();
                renderSlideshow();
                renderVideoPlayer();
            }
        }

        /* TEXT AND BULLETIN ENGINE */
        function renderTextElements() {
            document.getElementById("campus-updates").innerHTML = localStore.notices
                .map(item => `<div>▶ ${item}</div>`).join("");

            document.getElementById("student-highlights").innerHTML = localStore.highlights
                .map(item => `<div>★ ${item}</div>`).join("");

            const tickerText = document.getElementById("marquee-text");
            tickerText.textContent = localStore.bulletin;
            
            const calculationSpeed = Math.max(12, localStore.bulletin.length * 0.18);
            tickerText.style.animation = `marqueeLoop ${calculationSpeed}s linear infinite`;

            bindVerticalScroller("campus-updates", "primary-container");
            bindVerticalScroller("student-highlights", "secondary-container");
        }

        /* DYNAMIC TEXT SCROLLER CONTROLLER */
        function bindVerticalScroller(contentId, containerId) {
            const content = document.getElementById(contentId);
            const container = document.getElementById(containerId);
            
            content.style.animation = "none";
            
            setTimeout(() => {
                const travelDistance = content.offsetHeight;
                const viewWindow = container.offsetHeight;
                
                if (travelDistance > viewWindow) {
                    const dynamicDuration = Math.max(10, travelDistance * 0.05);
                    
                    const styleId = `scroll-${contentId}`;
                    let styleTag = document.getElementById(styleId);
                    if(!styleTag) {
                        styleTag = document.createElement('style');
                        styleTag.id = styleId;
                        document.head.appendChild(styleTag);
                    }
                    
                    styleTag.innerHTML = `
                        @keyframes loopMove-${contentId} {
                            0% { transform: translate3d(0, ${viewWindow}px, 0); }
                            100% { transform: translate3d(0, -${travelDistance}px, 0); }
                        }
                    `;
                    content.style.animation = `loopMove-${contentId} ${dynamicDuration}s linear infinite`;
                } else {
                    content.style.transform = "translate3d(0,0,0)";
                }
            }, 100);
        }

        /* IMAGE SLIDESHOW ENGINE */
        function renderSlideshow() {
            if (imgTimer) clearInterval(imgTimer);
            
            const imgElement = document.getElementById("slideshow");
            if (!localStore.images || !localStore.images.length) return;

            if(!imgElement.src || imgElement.src.startsWith("data:")) {
                imgElement.src = localStore.images[0];
            }

            imgTimer = setInterval(() => {
                slideshowIdx = (slideshowIdx + 1) % localStore.images.length;
                imgElement.src = localStore.images[slideshowIdx];
            }, 7000);
        }

        /* YOUTUBE IFRAME LOOPING ENGINE */
        function renderVideoPlayer() {
            if (videoInitialized) return; 
            
            const player = document.getElementById("yt-player");
            if (localStore.videos && localStore.videos.length) {
                const firstVideo = localStore.videos[0];
                const playlistIds = localStore.videos.join(",");
                
                player.src = `youtube.com{firstVideo}?autoplay=1&mute=1&controls=0&rel=0&loop=1&playlist=${playlistIds}&iv_load_policy=3&enablejsapi=1`;
                videoInitialized = true;
            }
        }

        /* ENGINE INITIALIZATION AND REFRESH LOOPS */
        fetchSignageData();
        setInterval(fetchSignageData, 60000);
    </script>
</body>
</html>
