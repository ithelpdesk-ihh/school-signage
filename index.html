<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invictus Live Signage</title>

<style>
:root {
    --navy: #0f172a;
    --gold: #f59e0b;
    --accent: #334155;
    --text-light: #f8fafc;
    --bg-dark: #020617;
}

/* RESET */
* {
    box-sizing: border-box;
}

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: "Segoe UI", sans-serif;
}

/* HEADER */
header {
    height: 14vh;
    background: var(--navy);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    border-bottom: 5px solid var(--gold);
}

.school-name {
    font-size: 1.7rem;
    font-weight: 900;
}

.clock-container {
    text-align: right;
}

#time {
    font-size: 3.5rem;
    font-weight: 800;
}

#date {
    color: var(--gold);
    font-size: 1.1rem;
}

/* MAIN LAYOUT */
main {
    height: 78vh;
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 15px;
    padding: 15px;
}

/* CARD FIX */
.card {
    background: var(--accent);
    border-radius: 16px;
    overflow: hidden;
    min-height: 0;
}

/* 🔥 ZOOM EFFECT (REPLACED) */
#slideshow {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1);
    transition: transform 6s ease-in-out;
}

/* RIGHT COLUMN */
.right-col {
    display: flex;
    flex-direction: column;
    gap: 15px;
    height: 100%;
}

/* VIDEO */
.video-box {
    flex: 3;
    background: #000;
}

/* BOTTOM TEXT */
.bottom-split {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

/* INFO PANEL */
.info-panel {
    padding: 12px;
    background: #fff;
    color: #1e293b;
    border-radius: 12px;
}

/* NEWS BAR */
#news-bar {
    height: 8vh;
    background: var(--gold);
    display: flex;
    align-items: center;
    color: #000;
}

.ticker-label {
    background: var(--navy);
    color: #fff;
    padding: 0 25px;
    font-weight: 900;
    font-size: 2rem;
    display: flex;
    align-items: center;
}

.marquee-container {
    flex: 1;
    overflow: hidden;
}

.marquee {
    white-space: nowrap;
    font-size: 1.7rem;
    font-weight: 700;
    padding-left: 100%;
    animation: scroll 35s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* MEDIA */
iframe, img {
    width: 100%;
    height: 100%;
    border: none;
    object-fit: cover;
}
</style>
</head>

<body>

<header>
<div class="school-name">
Invictus International School<br>
<span style="color: var(--gold); font-size: 2.5rem;">Horizon Hills</span>
</div>

<div class="clock-container">
<div id="time">00:00</div>
<div id="date">LOADING...</div>
</div>
</header>

<main>

<!-- IMAGE -->
<div class="card poster-box">
<img id="slideshow" src="">
</div>

<!-- RIGHT SIDE -->
<div class="right-col">

<!-- YOUTUBE -->
<div class="card video-box">
<iframe id="yt-player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<!-- TEXT -->
<div class="bottom-split">

<div class="info-panel" style="background: var(--gold); color: black;">
<h2>PRIMARY</h2>
<div id="campus-updates">Loading...</div>
</div>

<div class="info-panel" style="background: var(--navy); color: white;">
<h2 style="color: var(--gold);">SECONDARY</h2>
<div id="student-highlights">Loading...</div>
</div>

</div>
</div>

</main>

<div id="news-bar">
<div class="ticker-label">BULLETIN</div>
<div class="marquee-container">
<div id="marquee-text" class="marquee">Loading...</div>
</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyhWqhhzjiNfNCLPSPmltgmNH4jkIXJ6PvMfLZtkG079rzBNiYWHhowQrWQeIOweedC/exec";

/* CLOCK */
function clock() {
    const now = new Date();
    document.getElementById("time").innerText =
        now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById("date").innerText = now.toDateString();
}

/* IMAGE SYSTEM (ZOOM VERSION) */
let slideshowInterval;

async function refreshImages() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        if (data.images?.length) {
            const img = document.getElementById("slideshow");

            let i = 0;
            img.src = data.images[0];

            clearInterval(slideshowInterval);

            slideshowInterval = setInterval(() => {

                // RESET ZOOM
                img.style.transform = "scale(1)";

                setTimeout(() => {
                    i = (i + 1) % data.images.length;
                    img.src = data.images[i];

                    // ZOOM IN
                    setTimeout(() => {
                        img.style.transform = "scale(1.1)";
                    }, 100);
                }, 300);

            }, 5000);
        }
    } catch (e) {
        console.log("Image load error", e);
    }
}

/* TEXT SYSTEM */
async function refreshText() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        document.getElementById("campus-updates").innerHTML =
            (data.notices || ["No updates"]).map(n => `▶ ${n}`).join("<br>");

        document.getElementById("student-highlights").innerHTML =
            (data.highlights || ["No highlights"]).map(h => `★ ${h}`).join("<br>");

        document.getElementById("marquee-text").innerText =
            data.bulletin || "Welcome";
    } catch (e) {
        console.log("Text load error", e);
    }
}

/* YOUTUBE ONCE ONLY */
let videoLoaded = false;

async function loadYouTube() {
    try {
        if (videoLoaded) return;

        const res = await fetch(API_URL);
        const data = await res.json();

        if (data.videos?.length) {

            const player = document.getElementById("yt-player");

            const playlist = data.videos.join(",");
            const first = data.videos[0];

            player.src =
            `https://www.youtube.com/embed/${first}?autoplay=1&mute=1&controls=0&rel=0&loop=1&playlist=${playlist}`;

            videoLoaded = true;
        }
    } catch (e) {
        console.log("YouTube load error", e);
    }
}

/* START */
clock();
setInterval(clock, 1000);

refreshText();
refreshImages();
loadYouTube();

/* INTERVALS */
setInterval(refreshText, 20000);
setInterval(refreshImages, 300000);

</script>

</body>
</html>
