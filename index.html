<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invictus Live Signage</title>

<style>
:root {
    --navy: #0f172a;
    --gold: #f59e0b;
    --text-light: #f8fafc;
    --bg-dark: #020617;
}

* {
    box-sizing: border-box;
}

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: "Segoe UI", sans-serif;
}

/* HEADER */
header {
    height: 14vh;
    background: var(--navy);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    border-bottom: 5px solid var(--gold);
}

/* MAIN LAYOUT */
main {
    height: 78vh;
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 15px;
    padding: 15px;
}

/* IMAGE */
.card {
    border-radius: 16px;
    overflow: hidden;
    background: #111;
}

#slideshow {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* RIGHT SIDE */
.right-col {
    display: flex;
    flex-direction: column;
    gap: 15px;
    height: 100%;
}

/* VIDEO */
.video-box {
    flex: 3;
    background: black;
    border-radius: 16px;
    overflow: hidden;
}

/* BOTTOM AREA */
.bottom-split {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    min-height: 0;
}

/* INFO PANEL */
.info-panel {
    display: flex;
    flex-direction: column;
    border-radius: 12px;
    overflow: hidden;
    height: 100%;
}

/* HEADER */
.panel-header {
    padding: 10px 12px;
    font-weight: 900;
    font-size: 1rem;
}

/* DIVIDER */
.panel-divider {
    height: 3px;
    background: black;
}

/* CONTENT */
.panel-content {
    padding: 10px 12px;
    font-size: 0.95rem;
    line-height: 1.4;
}

/* PRIMARY (GOLD HEADER → NAVY CONTENT) */
.info-panel.primary .panel-header {
    background: var(--gold);
    color: black;
}

.info-panel.primary .panel-content {
    background: var(--navy);
    color: var(--text-light);
}

/* SECONDARY (NAVY HEADER → GOLD CONTENT) */
.info-panel.secondary .panel-header {
    background: var(--navy);
    color: var(--text-light);
}

.info-panel.secondary .panel-content {
    background: var(--gold);
    color: black;
}

/* NEWS BAR */
#news-bar {
    height: 8vh;
    background: var(--gold);
    display: flex;
    align-items: center;
    color: #000;
}

.ticker-label {
    background: var(--navy);
    color: #fff;
    padding: 0 25px;
    font-weight: 900;
    font-size: 2rem;
}

.marquee-container {
    flex: 1;
    overflow: hidden;
}

.marquee {
    white-space: nowrap;
    font-size: 1.7rem;
    font-weight: 700;
    padding-left: 100%;
    animation: scroll 35s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

iframe, img {
    width: 100%;
    height: 100%;
    border: none;
    object-fit: cover;
}
</style>
</head>

<body>

<header>
<div>
Invictus International School<br>
<span style="color: var(--gold); font-size: 2rem;">Horizon Hills</span>
</div>

<div>
<div id="time">00:00</div>
<div id="date">LOADING...</div>
</div>
</header>

<main>

<!-- IMAGE -->
<div class="card">
<img id="slideshow" src="">
</div>

<!-- RIGHT SIDE -->
<div class="right-col">

<!-- VIDEO -->
<div class="card video-box">
<iframe id="yt-player"></iframe>
</div>

<!-- PRIMARY + SECONDARY -->
<div class="bottom-split">

<div class="info-panel primary">
<div class="panel-header">PRIMARY</div>
<div class="panel-divider"></div>
<div id="campus-updates" class="panel-content">Loading...</div>
</div>

<div class="info-panel secondary">
<div class="panel-header">SECONDARY</div>
<div class="panel-divider"></div>
<div id="student-highlights" class="panel-content">Loading...</div>
</div>

</div>
</div>

</main>

<div id="news-bar">
<div class="ticker-label">BULLETIN</div>
<div class="marquee-container">
<div id="marquee-text" class="marquee">Loading...</div>
</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyhWqhhzjiNfNCLPSPmltgmNH4jkIXJ6PvMfLZtkG079rzBNiYWHhowQrWQeIOweedC/exec";

function clock() {
    const now = new Date();
    document.getElementById("time").innerText =
        now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById("date").innerText = now.toDateString();
}

let slideshowInterval;

async function refreshImages() {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (data.images?.length) {
        const img = document.getElementById("slideshow");

        let i = 0;
        img.src = data.images[0];

        clearInterval(slideshowInterval);

        slideshowInterval = setInterval(() => {
            i = (i + 1) % data.images.length;
            img.src = data.images[i];
        }, 5000);
    }
}

async function refreshText() {
    const res = await fetch(API_URL);
    const data = await res.json();

    document.getElementById("campus-updates").innerHTML =
        (data.notices || []).map(n => `▶ ${n}`).join("<br>");

    document.getElementById("student-highlights").innerHTML =
        (data.highlights || []).map(h => `★ ${h}`).join("<br>");

    document.getElementById("marquee-text").innerText =
        data.bulletin || "Welcome";
}

let videoLoaded = false;

async function loadYouTube() {
    if (videoLoaded) return;

    const res = await fetch(API_URL);
    const data = await res.json();

    if (data.videos?.length) {
        const player = document.getElementById("yt-player");

        const playlist = data.videos.join(",");
        const first = data.videos[0];

        player.src =
        `https://www.youtube.com/embed/${first}?autoplay=1&mute=1&controls=0&rel=0&loop=1&playlist=${playlist}`;

        videoLoaded = true;
    }
}

clock();
setInterval(clock, 1000);

refreshText();
refreshImages();
loadYouTube();

setInterval(refreshText, 20000);
setInterval(refreshImages, 300000);
</script>

</body>
</html>
