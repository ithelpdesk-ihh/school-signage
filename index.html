<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invictus Live Signage</title>

<style>
:root {
    --navy: #0f172a;
    --gold: #f59e0b;
    --accent: #334155;
    --text-light: #f8fafc;
    --bg-dark: #020617;
}

/* GLOBAL */
body, html {
    margin: 0;
    padding: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: "Segoe UI", sans-serif;
}

/* HEADER */
header {
    height: 16vh;
    background: var(--navy);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    border-bottom: 5px solid var(--gold);
    box-sizing: border-box;
}

/* SCHOOL NAME */
.school-name {
    font-size: 1.9rem;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1.2;
}

/* CLOCK CONTAINER */
.clock-container {
    text-align: right;
}

/* CLOCK */
#time {
    font-size: 4.2rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: 1px;
}

/* DATE */
#date {
    color: var(--gold);
    font-size: 1.3rem;
    font-weight: 600;
    text-transform: uppercase;
    margin-top: 4px;
}

/* MAIN LAYOUT */
main {
    height: 76vh;
    display: grid;
    grid-template-columns: 0.8fr 1.5fr;
    gap: 18px;
    padding: 18px;
    box-sizing: border-box;
}

/* CARDS */
.card {
    background: var(--accent);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

/* RIGHT COLUMN */
.right-col {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

/* VIDEO */
.video-box {
    flex: 4;
    background: #000;
    border-radius: 18px;
    position: relative;
}

/* Make YouTube player fill box */
#yt-player {
    width: 100%;
    height: 100%;
}

/* BOTTOM PANELS */
.bottom-split {
    flex: 1.2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
}

/* INFO PANELS */
.info-panel {
    padding: 16px 18px;
    background: #ffffff;
    color: #1e293b;
    border-radius: 16px;
    box-sizing: border-box;
}

.info-panel h2 {
    margin: 0 0 8px;
    font-size: 1.1rem;
    color: var(--navy);
    border-bottom: 2px solid #e5e7eb;
    padding-bottom: 6px;
}

/* NEWS BAR */
#news-bar {
    height: 8vh;
    background: var(--gold);
    color: #000;
    display: flex;
    align-items: center;
}

.ticker-label {
    background: var(--navy);
    color: #fff;
    padding: 0 25px;
    height: 100%;
    display: flex;
    align-items: center;
    font-size: 1.2rem;
    font-weight: 900;
}

.marquee-container {
    flex: 1;
    overflow: hidden;
}

.marquee {
    white-space: nowrap;
    font-size: 2rem;
    font-weight: 700;
    display: inline-block;
    padding-left: 100%;
    animation: scroll 35s linear infinite;
    line-height: 8vh;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* MEDIA */
img {
    width: 100%;
    height: 100%;
    border: none;
    object-fit: cover;
}
</style>

<!-- YOUTUBE API -->
<script src="https://www.youtube.com/iframe_api"></script>

</head>

<body>

<header>
<div class="school-name">
    Invictus International School<br>
    <span style="color: var(--gold); font-size: 3rem;">
        Horizon Hills
    </span>
</div>

<div class="clock-container">
    <div id="time">00:00</div>
    <div id="date">LOADING...</div>
</div>
</header>

<main>

    <!-- LEFT SLIDESHOW -->
    <div class="card poster-box">
        <img id="slideshow" src="">
    </div>

    <!-- RIGHT -->
    <div class="right-col">

        <!-- VIDEO -->
        <div class="card video-box">
            <div id="yt-player"></div>
        </div>

        <!-- BOTTOM PANELS -->
        <div class="bottom-split">

            <div class="card info-panel"
                 id="campus-updates"
                 style="background: var(--gold); color: black;">

                <h2>PRIMARY</h2>
                <div class="content">Loading updates...</div>

            </div>

            <div class="card info-panel"
                 style="background: var(--navy); color: white;">

                <h2 style="color: var(--gold);">SECONDARY</h2>

                <div id="student-highlights" class="content">
                    Loading highlights...
                </div>

            </div>

        </div>

    </div>

</main>

<!-- BULLETIN -->
<div id="news-bar">

    <div class="ticker-label">
        BULLETIN
    </div>

    <div class="marquee-container">
        <div id="marquee-text" class="marquee">
            Connecting to Google...
        </div>
    </div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyhWqhhzjiNfNCLPSPmltgmNH4jkIXJ6PvMfLZtkG079rzBNiYWHhowQrWQeIOweedC/exec";

let slideshowInterval;

// =========================
// YOUTUBE VARIABLES
// =========================
let player;
let playlist = [];
let currentVideo = 0;

// =========================
// YOUTUBE API READY
// =========================
function onYouTubeIframeAPIReady() {

    player = new YT.Player('yt-player', {

        height: '100%',
        width: '100%',

        playerVars: {
            autoplay: 1,
            controls: 0,
            rel: 0,
            modestbranding: 1,
            mute: 1,
            playsinline: 1,
            disablekb: 1,
            iv_load_policy: 3
        },

        events: {
            'onStateChange': onPlayerStateChange
        }
    });
}

// =========================
// PLAY CURRENT VIDEO
// =========================
function playCurrentVideo() {

    if (!playlist.length) return;

    player.loadVideoById(playlist[currentVideo]);
}

// =========================
// AUTO NEXT VIDEO
// =========================
function onPlayerStateChange(event) {

    if (event.data === YT.PlayerState.ENDED) {

        currentVideo++;

        if (currentVideo >= playlist.length) {
            currentVideo = 0;
        }

        playCurrentVideo();
    }
}

// =========================
// REFRESH SIGNAGE
// =========================
async function refreshSignage() {

    try {

        const res = await fetch(API_URL);
        const data = await res.json();

        // =========================
        // SLIDESHOW
        // =========================
        if (data.images && data.images.length > 0) {

            const img = document.getElementById("slideshow");

            let i = 0;

            img.src = data.images[0];

            if (slideshowInterval)
                clearInterval(slideshowInterval);

            slideshowInterval = setInterval(() => {

                i = (i + 1) % data.images.length;
                img.src = data.images[i];

            }, 10000);
        }

        // =========================
        // PRIMARY PANEL
        // =========================
        const campusContent =
            document.getElementById("campus-updates")
            .querySelector(".content");

        campusContent.innerHTML =
            (data.notices || [])
            .map(n => `▶ ${n}`)
            .join("<br>");

        // =========================
        // SECONDARY PANEL
        // =========================
        const highlightContent =
            document.getElementById("student-highlights");

        highlightContent.innerHTML =
            (data.highlights || [])
            .map(h => `★ ${h}`)
            .join("<br>");

        // =========================
        // BULLETIN
        // =========================
        document.getElementById("marquee-text").innerText =
            data.bulletin || "Welcome";

        // =========================
        // VIDEO PLAYLIST
        // =========================
        if (data.videos && data.videos.length > 0) {

            playlist = data.videos;

            // Start only once
            if (player && player.getPlayerState() === -1) {

                currentVideo = 0;
                playCurrentVideo();
            }
        }

    } catch (e) {

        console.error(e);
    }
}

// =========================
// CLOCK
// =========================
function clock() {

    const now = new Date();

    document.getElementById('time').innerText =
        now.toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit'
        });

    document.getElementById('date').innerText =
        now.toDateString();
}

// =========================
// START
// =========================
setInterval(clock, 1000);

clock();

refreshSignage();

setInterval(refreshSignage, 300000);

</script>

</body>
</html>
