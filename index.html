<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invictus Live Signage</title>

<style>
:root {
    --navy: #0f172a;
    --gold: #f59e0b;
    --text-light: #f8fafc;
    --bg-dark: #020617;
}

* {
    box-sizing: border-box;
}

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: "Segoe UI", sans-serif;
}

/* HEADER */
header {
    height: 14vh;
    background: var(--navy);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
}

/* MAIN */
main {
    height: 78vh;
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 15px;
    padding: 15px;
}

/* IMAGE */
.card {
    border-radius: 16px;
    overflow: hidden;
    background: #111;
}

#slideshow {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* RIGHT SIDE */
.right-col {
    display: flex;
    flex-direction: column;
    gap: 15px;
    height: 100%;
}

/* ✅ SMALLER YOUTUBE (FIXED HEIGHT) */
.video-box {
    flex: 0 0 28%;
    background: black;
    border-radius: 16px;
    overflow: hidden;
}

/* TEXT AREA BIGGER */
.bottom-split {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

/* INFO BOX */
.info-panel {
    display: flex;
    flex-direction: column;
    border-radius: 12px;
    overflow: hidden;
}

/* HEADER */
.panel-header {
    padding: 10px;
    font-weight: 900;
}

/* DIVIDER */
.panel-divider {
    height: 3px;
    background: black;
}

/* CONTENT AREA (REAL SCROLL) */
.panel-content {
    flex: 1;
    overflow: hidden;
    position: relative;
    padding: 10px;
}

/* SCROLL WRAPPER */
.scroll-inner {
    display: flex;
    flex-direction: column;
    animation: scrollUp 15s linear infinite;
}

/* SHOW ALL TEXT */
@keyframes scrollUp {
    0% { transform: translateY(0); }
    100% { transform: translateY(-50%); }
}

/* PRIMARY */
.primary .panel-header {
    background: var(--gold);
    color: black;
}

.primary .panel-content {
    background: var(--navy);
    color: var(--text-light);
}

/* SECONDARY */
.secondary .panel-header {
    background: var(--navy);
    color: var(--text-light);
}

.secondary .panel-content {
    background: var(--gold);
    color: black;
}

/* NEWS */
#news-bar {
    height: 8vh;
    background: var(--gold);
    display: flex;
    align-items: center;
}

.ticker-label {
    background: var(--navy);
    color: white;
    padding: 0 25px;
    font-weight: 900;
}

.marquee-container {
    flex: 1;
    overflow: hidden;
}

.marquee {
    white-space: nowrap;
    font-size: 1.6rem;
    font-weight: 700;
    padding-left: 100%;
    animation: scroll 35s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

iframe, img {
    width: 100%;
    height: 100%;
    border: none;
    object-fit: cover;
}
</style>
</head>

<body>

<header>
<div>
Invictus International School<br>
<span style="color: var(--gold);">Horizon Hills</span>
</div>

<div>
<div id="time">00:00</div>
<div id="date">LOADING...</div>
</div>
</header>

<main>

<!-- IMAGE -->
<div class="card">
<img id="slideshow">
</div>

<!-- RIGHT -->
<div class="right-col">

<!-- VIDEO -->
<div class="card video-box">
<iframe id="yt-player"></iframe>
</div>

<!-- TEXT -->
<div class="bottom-split">

<!-- PRIMARY -->
<div class="info-panel primary">
<div class="panel-header">PRIMARY</div>
<div class="panel-divider"></div>
<div class="panel-content">
<div class="scroll-inner" id="campus-updates"></div>
</div>
</div>

<!-- SECONDARY -->
<div class="info-panel secondary">
<div class="panel-header">SECONDARY</div>
<div class="panel-divider"></div>
<div class="panel-content">
<div class="scroll-inner" id="student-highlights"></div>
</div>
</div>

</div>
</div>

</main>

<div id="news-bar">
<div class="ticker-label">BULLETIN</div>
<div class="marquee-container">
<div id="marquee-text" class="marquee">Loading...</div>
</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyhWqhhzjiNfNCLPSPmltgmNH4jkIXJ6PvMfLZtkG079rzBNiYWHhowQrWQeIOweedC/exec";

/* CLOCK */
function clock() {
    const now = new Date();
    document.getElementById("time").innerText =
        now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById("date").innerText = now.toDateString();
}

/* IMAGE */
let slideshowInterval;

async function refreshImages() {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (data.images?.length) {
        const img = document.getElementById("slideshow");

        let i = 0;
        img.src = data.images[0];

        clearInterval(slideshowInterval);

        slideshowInterval = setInterval(() => {
            i = (i + 1) % data.images.length;
            img.src = data.images[i];
        }, 5000);
    }
}

/* TEXT (AUTO DUP FOR SMOOTH SCROLL) */
async function refreshText() {
    const res = await fetch(API_URL);
    const data = await res.json();

    const primary = (data.notices || []).map(n => `<div>▶ ${n}</div>`).join("");
    const secondary = (data.highlights || []).map(h => `<div>★ ${h}</div>`).join("");

    document.getElementById("campus-updates").innerHTML = primary + primary;
    document.getElementById("student-highlights").innerHTML = secondary + secondary;

    document.getElementById("marquee-text").innerText =
        data.bulletin || "Welcome";
}

/* YOUTUBE */
let videoLoaded = false;

async function loadYouTube() {
    if (videoLoaded) return;

    const res = await fetch(API_URL);
    const data = await res.json();

    if (data.videos?.length) {
        const player = document.getElementById("yt-player");

        const playlist = data.videos.join(",");
        const first = data.videos[0];

        player.src =
        `https://www.youtube.com/embed/${first}?autoplay=1&mute=1&controls=0&rel=0&loop=1&playlist=${playlist}`;

        videoLoaded = true;
    }
}

clock();
setInterval(clock, 1000);

refreshText();
refreshImages();
loadYouTube();

setInterval(refreshText, 20000);
setInterval(refreshImages, 300000);
</script>

</body>
</html>
