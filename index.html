<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invictus Live Signage</title>

    <style>
        :root { --navy: #0f172a; --gold: #f59e0b; --accent: #334155; --text-light: #f8fafc; --bg-dark: #020617; }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: sans-serif;
        }

        header {
            height: 18vh;
            background: var(--navy);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 6px solid var(--gold);
            box-sizing: border-box;
        }

        .school-name {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        #time {
            font-size: 7rem;
            font-weight: 800;
            line-height: 1;
        }

        #date {
            color: var(--gold);
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        main {
            height: 74vh;
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--accent);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .right-col {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-box {
            flex: 4;
            background: #000;
        }

        .bottom-split {
            flex: 1.2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .info-panel {
            padding: 18px 25px;
            background: #ffffff;
            color: #1e293b;
            height: 100%;
            box-sizing: border-box;
        }

        .info-panel h2 {
            margin: 0 0 10px;
            font-size: 1.3rem;
            color: var(--navy);
            border-bottom: 2px solid #f1f5f9;
        }

        #news-bar {
            height: 8vh;
            background: var(--gold);
            color: #000;
            display: flex;
            align-items: center;
        }

        .ticker-label {
            background: var(--navy);
            color: #fff;
            padding: 0 30px;
            height: 100%;
            display: flex;
            align-items: center;
            font-size: 1.4rem;
            font-weight: 900;
        }

        .marquee-container {
            flex: 1;
            overflow: hidden;
        }

        .marquee {
            white-space: nowrap;
            font-size: 2.5rem;
            font-weight: 800;
            display: inline-block;
            padding-left: 100%;
            animation: scroll 35s linear infinite;
            line-height: 8vh;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-100%); }
        }

        iframe, img, video {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: cover;
        }
    </style>
</head>

<body>

<header>
    <div class="school-name">
        Invictus International School<br>
        <span style="color: var(--gold); font-size: 3rem;">Horizon Hills</span>
    </div>

    <div class="clock-container">
        <div id="time">00:00:00</div>
        <div id="date">LOADING...</div>
    </div>
</header>

<main>

    <div class="card poster-box">
        <img id="slideshow" src="">
    </div>

    <div class="right-col">

        <!-- ✅ GOOGLE DRIVE VIDEO PLAYER -->
    <div class="card video-box">
        <video id="video-player"
           autoplay
           muted
           playsinline
           preload="auto"></video>
    </div>

        <div class="bottom-split">

            <div class="card info-panel" id="campus-updates" style="background: var(--gold); color: black;">
                <h2>CAMPUS UPDATES</h2>
                <div class="content">Loading updates...</div>
            </div>

            <div class="card info-panel" style="background: var(--navy); color: white;">
                <h2 style="color: var(--gold);">STUDENT HIGHLIGHTS</h2>
                <div id="student-highlights" class="content">Loading highlights...</div>
            </div>

        </div>
    </div>
</main>

<div id="news-bar">
    <div class="ticker-label">BULLETIN</div>
    <div class="marquee-container">
        <div id="marquee-text" class="marquee">Connecting to Google...</div>
    </div>
</div>

<script>

const API_URL =
  "https://script.google.com/macros/s/AKfycbyhWqhhzjiNfNCLPSPmltgmNH4jkIXJ6PvMfLZtkG079rzBNiYWHhowQrWQeIOweedC/exec";

let slideshowInterval;
let currentVideo = 0;
let videoInterval;

async function refreshSignage() {

    try {

        const res = await fetch(API_URL);
        const data = await res.json();

        // -------------------------
        // SLIDESHOW
        // -------------------------
        if (data.images && data.images.length > 0) {

            const img = document.getElementById("slideshow");
            let i = 0;

            img.src = data.images[0];

            if (slideshowInterval) clearInterval(slideshowInterval);

            slideshowInterval = setInterval(() => {
                i = (i + 1) % data.images.length;
                img.src = data.images[i];
            }, 10000);
        }

        // -------------------------
        // TEXT CONTENT
        // -------------------------
        document.getElementById("campus-updates").querySelector(".content").innerHTML =
            (data.notices || []).map(n => `▶ ${n}`).join("<br>");

        document.getElementById("student-highlights").innerHTML =
            (data.highlights || []).map(h => `★ ${h}`).join("<br>");

        document.getElementById("marquee-text").innerText =
            data.bulletin || "Welcome";

    } catch (e) {
        console.error(e);
    }
}

// CLOCK
function clock() {
    const now = new Date();
    document.getElementById("time").innerText = now.toLocaleTimeString();
    document.getElementById("date").innerText = now.toDateString();
}

setInterval(clock, 1000);
clock();

refreshSignage();
setInterval(refreshSignage, 300000);

</script>

</body>
</html>
