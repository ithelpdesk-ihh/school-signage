<script>
    // 1. Your verified API URL
    const API_URL = "https://script.google.com/macros/s/AKfycbyhWqhhzjiNfNCLPSPmltgmNH4jkIXJ6PvMfLZtkG079rzBNiYWHhowQrWQeIOweedC/exec";

    let slideshowInterval;

    async function refreshSignage() {
        console.log("Fetching data from Google Drive...");
        try {
            // Adding a timestamp to prevent the browser from showing "old" cached data
            const response = await fetch(API_URL + "?t=" + Date.now());
            const data = await response.json();
            console.log("Data received:", data);

            // 1. Update Images (Slideshow)
            const imgEl = document.getElementById('slideshow');
            if (data.images && data.images.length > 0) {
                let imgIdx = 0;
                imgEl.src = data.images[0];
                
                // Clear old interval if it exists to prevent speed-up bugs
                if(slideshowInterval) clearInterval(slideshowInterval);
                
                slideshowInterval = setInterval(() => {
                    imgIdx = (imgIdx + 1) % data.images.length;
                    imgEl.src = data.images[imgIdx];
                }, 15000); 
            }

            // 2. Update Campus Updates (Left Panel)
            const campusBox = document.querySelector('#campus-updates .content');
            if (data.notices) {
                campusBox.innerHTML = data.notices.map(n => `<div class="notice-item">▶ ${n}</div>`).join('');
            }

            // 3. Update Bulletin (Bottom Marquee)
            if (data.bulletin) {
                document.getElementById('marquee-text').innerText = data.bulletin;
            }

        } catch (e) { 
            console.error("Fetch Error: Check if Apps Script is deployed as 'Anyone'", e); 
        }
    }

    function runClock() {
        const now = new Date();
        const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        
        document.getElementById('time').innerText = now.toLocaleTimeString('en-US', timeOptions);
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', dateOptions);
    }

    // Initial Start
    runClock();
    setInterval(runClock, 1000);
    
    refreshSignage();
    setInterval(refreshSignage, 300000); // Refresh data every 5 minutes
</script>
