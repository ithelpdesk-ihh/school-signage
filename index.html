<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invictus Live Signage</title>

<style>
:root {
    --navy: #0f172a;
    --gold: #f59e0b;
    --accent: #334155;
    --text-light: #f8fafc;
    --bg-dark: #020617;
}

/* RESET */
* {
    box-sizing: border-box;
}

body, html {
    margin: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg-dark);
    font-family: Arial, sans-serif;
    color: white;
}

/* HEADER */
header {
    height: 14vh;
    background: var(--navy);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 25px;
    border-bottom: 4px solid var(--gold);
}

.school-name {
    font-weight: 900;
    font-size: 1.6rem;
}

#time {
    font-size: 3rem;
    font-weight: bold;
}

#date {
    color: var(--gold);
}

/* MAIN */
main {
    height: 78vh;
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 12px;
    padding: 12px;
}

/* CARD */
.card {
    background: var(--accent);
    border-radius: 14px;
    overflow: hidden;
}

/* 🔥 IMAGE ZOOM EFFECT */
#slideshow {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1);
    transition: transform 10s ease-in-out;
}

/* RIGHT SIDE */
.right {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* VIDEO */
.video {
    flex: 3;
    background: black;
}

/* TEXT BOX */
.bottom {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.box {
    background: white;
    color: black;
    padding: 10px;
    border-radius: 12px;
}

/* BULLETIN */
#news-bar {
    height: 8vh;
    background: var(--gold);
    display: flex;
    align-items: center;
    color: black;
}

.label {
    background: var(--navy);
    color: white;
    padding: 0 20px;
    font-weight: bold;
}

.marquee {
    flex: 1;
    overflow: hidden;
    white-space: nowrap;
    font-size: 1.6rem;
    font-weight: bold;
    padding-left: 100%;
    animation: scroll 30s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* MEDIA */
img, iframe {
    width: 100%;
    height: 100%;
    border: none;
    object-fit: cover;
}
</style>
</head>

<body>

<header>
<div class="school-name">
Invictus International School<br>
<span style="color: var(--gold)">Horizon Hills</span>
</div>

<div>
<div id="time">00:00</div>
<div id="date">Loading...</div>
</div>
</header>

<main>

<!-- IMAGE -->
<div class="card">
<img id="slideshow">
</div>

<!-- RIGHT -->
<div class="right">

<!-- VIDEO -->
<div class="card video">
<iframe id="yt-player" allow="autoplay; encrypted-media"></iframe>
</div>

<!-- TEXT -->
<div class="bottom">

<div class="box" style="background: var(--gold)">
<h3>PRIMARY</h3>
<div id="campus-updates"></div>
</div>

<div class="box" style="background: var(--navy); color:white">
<h3 style="color: var(--gold)">SECONDARY</h3>
<div id="student-highlights"></div>
</div>

</div>
</div>

</main>

<!-- BULLETIN -->
<div id="news-bar">
<div class="label">BULLETIN</div>
<div class="marquee" id="marquee-text">Loading...</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyhWqhhzjiNfNCLPSPmltgmNH4jkIXJ6PvMfLZtkG079rzBNiYWHhowQrWQeIOweedC/exec";

/* CLOCK */
function clock() {
    const now = new Date();
    document.getElementById("time").innerText =
        now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById("date").innerText = now.toDateString();
}

/* IMAGE ZOOM SLIDESHOW */
let i = 0;

async function loadImages() {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (!data.images || data.images.length === 0) return;

    const img = document.getElementById("slideshow");

    img.src = data.images[0];

    setInterval(() => {

        // reset zoom
        img.style.transform = "scale(1)";

        setTimeout(() => {
            i = (i + 1) % data.images.length;
            img.src = data.images[i];

            // zoom in
            setTimeout(() => {
                img.style.transform = "scale(1.1)";
            }, 50);

        }, 500);

    }, 8000);
}

/* TEXT */
async function loadText() {
    const res = await fetch(API_URL);
    const data = await res.json();

    document.getElementById("campus-updates").innerHTML =
        (data.notices || []).join("<br>");

    document.getElementById("student-highlights").innerHTML =
        (data.highlights || []).join("<br>");

    document.getElementById("marquee-text").innerText =
        data.bulletin || "Welcome";
}

/* YOUTUBE ONCE */
let videoLoaded = false;

async function loadYouTube() {
    if (videoLoaded) return;

    const res = await fetch(API_URL);
    const data = await res.json();

    if (data.videos?.length) {

        const player = document.getElementById("yt-player");

        const playlist = data.videos.join(",");
        const first = data.videos[0];

        player.src =
        `https://www.youtube.com/embed/${first}?autoplay=1&mute=1&controls=0&loop=1&playlist=${playlist}`;

        videoLoaded = true;
    }
}

/* START */
clock();
setInterval(clock, 1000);

loadImages();
loadText();
loadYouTube();

setInterval(loadText, 20000);

</script>

</body>
</html>
