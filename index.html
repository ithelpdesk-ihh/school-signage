<script>
    const API_URL = "https://google.com";
    let slideshowInterval;

    async function refreshSignage() {
        try {
            console.log("Fetching latest data...");
            const response = await fetch(API_URL, {
                method: 'GET',
                mode: 'cors',
                cache: 'no-cache'
            });

            if (!response.ok) throw new Error("Server response failed");
            
            const data = await response.json();

            // 1. Update Campus Updates (Notices)
            const campusBox = document.querySelector('#campus-updates .content');
            if (data.notices) {
                campusBox.innerHTML = data.notices.map(n => `<div class="notice-item">▶ ${n}</div>`).join('');
            }

            // 2. Update Student Highlights (NEW)
            const highlightsBox = document.querySelector('#student-highlights');
            if (data.highlights) {
                highlightsBox.innerHTML = data.highlights.map(h => `<div style="margin-bottom:10px;">★ ${h}</div>`).join('');
            }

            // 3. Update Bulletin (Marquee)
            document.getElementById('marquee-text').innerText = data.bulletin || "Welcome to Invictus International School";

            // 4. Slideshow Logic
            if (data.images && data.images.length > 0) {
                const imgEl = document.getElementById('slideshow');
                let idx = 0;
                imgEl.src = data.images[0]; // Set first image immediately
                
                if(slideshowInterval) clearInterval(slideshowInterval);
                slideshowInterval = setInterval(() => {
                    idx = (idx + 1) % data.images.length;
                    imgEl.src = data.images[idx];
                }, 15000);
            }

            // 5. Update Video
            if (data.videoId) {
                document.getElementById('yt-player').src = `https://youtube.com{data.videoId}?autoplay=1&mute=1&loop=1&playlist=${data.videoId}`;
            }

        } catch (e) { 
            document.getElementById('marquee-text').innerText = "Sync Error: " + e.message;
            console.error("Fetch Error:", e);
        }
    }

    function runClock() {
        const now = new Date();
        document.getElementById('time').innerText = now.toLocaleTimeString();
        document.getElementById('date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
    }

    runClock(); 
    setInterval(runClock, 1000);
    refreshSignage(); 
    setInterval(refreshSignage, 300000); // Refresh every 5 minutes
</script>
