<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invictus Live Signage</title>

<style>
:root {
    --navy: #0f172a;
    --gold: #f59e0b;
    --accent: #334155;
    --text-light: #f8fafc;
    --bg-dark: #020617;
}

body, html {
    margin: 0;
    padding: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: "Segoe UI", sans-serif;
}

header {
    height: 16vh;
    background: var(--navy);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    border-bottom: 5px solid var(--gold);
    box-sizing: border-box;
}

.school-name {
    font-size: 1.9rem;
    font-weight: 900;
    text-transform: uppercase;
}

.clock-container {
    text-align: right;
}

#time {
    font-size: 4.2rem;
    font-weight: 800;
}

#date {
    color: var(--gold);
    font-size: 1.3rem;
}

main {
    height: 76vh;
    display: grid;
    grid-template-columns: 0.8fr 1.5fr;
    gap: 18px;
    padding: 18px;
}

.card {
    background: var(--accent);
    border-radius: 18px;
    overflow: hidden;
}

.right-col {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.video-box {
    flex: 4;
    background: #000;
}

.bottom-split {
    flex: 1.2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
}

.info-panel {
    padding: 16px;
    background: #fff;
    color: #1e293b;
    border-radius: 16px;
}

#news-bar {
    height: 8vh;
    background: var(--gold);
    display: flex;
    align-items: center;
    color: #000;
}

.ticker-label {
    background: var(--navy);
    color: #fff;
    padding: 0 25px;
    font-weight: 900;
    display: flex;
    align-items: center;
}

.marquee-container {
    flex: 1;
    overflow: hidden;
}

.marquee {
    white-space: nowrap;
    font-size: 2rem;
    font-weight: 700;
    padding-left: 100%;
    animation: scroll 35s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

iframe, img {
    width: 100%;
    height: 100%;
    border: none;
    object-fit: cover;
}
</style>
</head>

<body>

<header>
<div class="school-name">
Invictus International School<br>
<span style="color: var(--gold); font-size: 3rem;">Horizon Hills</span>
</div>

<div class="clock-container">
<div id="time">00:00</div>
<div id="date">LOADING...</div>
</div>
</header>

<main>

<!-- IMAGE -->
<div class="card">
<img id="slideshow">
</div>

<!-- RIGHT SIDE -->
<div class="right-col">

<!-- YOUTUBE -->
<div class="card video-box">
<iframe id="yt-player" allow="autoplay" allowfullscreen></iframe>
</div>

<!-- TEXT -->
<div class="bottom-split">

<div class="info-panel" style="background: var(--gold); color: black;">
<h2>PRIMARY</h2>
<div id="campus-updates"></div>
</div>

<div class="info-panel" style="background: var(--navy); color: white;">
<h2 style="color: var(--gold);">SECONDARY</h2>
<div id="student-highlights"></div>
</div>

</div>
</div>

</main>

<div id="news-bar">
<div class="ticker-label">BULLETIN</div>
<div class="marquee-container">
<div id="marquee-text" class="marquee">Loading...</div>
</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyhWqhhzjiNfNCLPSPmltgmNH4jkIXJ6PvMfLZtkG079rzBNiYWHhowQrWQeIOweedC/exec";

/* ================= CLOCK ================= */
function clock() {
    const now = new Date();
    document.getElementById("time").innerText =
        now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById("date").innerText = now.toDateString();
}

/* ================= IMAGE (5 MIN) ================= */
let slideshowInterval;

async function refreshImages() {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (data.images?.length) {
        const img = document.getElementById("slideshow");

        let i = 0;
        img.src = data.images[0];

        clearInterval(slideshowInterval);

        slideshowInterval = setInterval(() => {
            i = (i + 1) % data.images.length;
            img.src = data.images[i];
        }, 10000);
    }
}

/* ================= TEXT (20 SEC) ================= */
async function refreshText() {
    const res = await fetch(API_URL);
    const data = await res.json();

    document.getElementById("campus-updates").innerHTML =
        (data.notices || []).map(n => `▶ ${n}`).join("<br>");

    document.getElementById("student-highlights").innerHTML =
        (data.highlights || []).map(h => `★ ${h}`).join("<br>");

    document.getElementById("marquee-text").innerText =
        data.bulletin || "Welcome";
}

/* ================= YOUTUBE (ONCE ONLY) ================= */
let videoLoaded = false;

async function loadYouTube() {
    if (videoLoaded) return;

    const res = await fetch(API_URL);
    const data = await res.json();

    if (data.videos?.length) {

        const player = document.getElementById("yt-player");

        const playlist = data.videos.join(",");
        const first = data.videos[0];

        player.src =
        `https://www.youtube.com/embed/${first}?autoplay=1&mute=1&controls=0&rel=0&loop=1&playlist=${playlist}`;

        videoLoaded = true;
    }
}

/* ================= START ================= */

clock();
setInterval(clock, 1000);

/* initial load */
refreshText();
refreshImages();
loadYouTube();

/* intervals */
setInterval(refreshText, 20000);     // TEXT
setInterval(refreshImages, 300000);  // IMAGE

</script>

</body>
</html>
