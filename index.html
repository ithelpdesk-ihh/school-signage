<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invictus Signage</title>

<style>
:root{
  --navy:#0f172a;
  --gold:#f59e0b;
  --bg:#020617;
  --text:#f8fafc;
}

body,html{
  margin:0;
  padding:0;
  height:100vh;
  width:100vw;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:sans-serif;
}

header{
  height:18vh;
  background:var(--navy);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 40px;
  border-bottom:6px solid var(--gold);
}

#time{font-size:5rem;font-weight:800;}
#date{color:var(--gold);}

main{
  height:74vh;
  display:grid;
  grid-template-columns:1fr 1.3fr;
  gap:20px;
  padding:20px;
}

.card{
  background:#334155;
  border-radius:20px;
  overflow:hidden;
}

.right{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.video-box{
  flex:4;
  background:black;
}

.bottom{
  flex:1.2;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  color:black;
}

.info{
  background:white;
  padding:10px;
}

iframe,img{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<header>
  <div>
    Invictus School<br>
    <span style="color:var(--gold)">Horizon Hills</span>
  </div>
  <div>
    <div id="time">00:00</div>
    <div id="date">Loading...</div>
  </div>
</header>

<main>

<!-- VIDEO -->
<div class="card video-box">
  <iframe id="yt"></iframe>
</div>

<!-- RIGHT SIDE -->
<div class="right">

  <div class="bottom">

    <div class="info" id="notices"></div>
    <div class="info" id="highlights"></div>

  </div>

</div>

</main>

<script>

const API =
 "YOUR_SCRIPT_URL_HERE";

let videoIndex = 0;
let timer;

async function load(){

 const res = await fetch(API);
 const data = await res.json();

 // ---------------- VIDEO ----------------
 if(data.videos?.length){

   const yt = document.getElementById("yt");

   function play(i){

     const id = data.videos[i];

     yt.src =
       `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&rel=0&loop=1&playlist=${id}`;
   }

   play(videoIndex);

   clearInterval(timer);

   timer = setInterval(()=>{

     videoIndex =
       (videoIndex + 1) % data.videos.length;

     play(videoIndex);

   },60000);
 }

 // ---------------- TEXT ----------------
 document.getElementById("notices").innerHTML =
   (data.notices||[]).join("<br>");

 document.getElementById("highlights").innerHTML =
   (data.highlights||[]).join("<br>");

}

// CLOCK
setInterval(()=>{
 const now = new Date();
 document.getElementById("time").innerText = now.toLocaleTimeString();
 document.getElementById("date").innerText = now.toDateString();
},1000);

load();
setInterval(load,300000);

</script>

</body>
</html>
