<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invictus Live Signage</title>

<style>
:root { --navy:#0f172a; --gold:#f59e0b; --accent:#334155; --text-light:#f8fafc; --bg-dark:#020617; }

body,html{
margin:0;padding:0;height:100vh;width:100vw;
overflow:hidden;background:var(--bg-dark);
color:var(--text-light);font-family:sans-serif;
}

header{
height:18vh;background:var(--navy);
display:flex;justify-content:space-between;
align-items:center;padding:0 50px;
border-bottom:6px solid var(--gold);
box-sizing:border-box;
}

.school-name{font-size:2.2rem;font-weight:900;text-transform:uppercase;}

#time{font-size:7rem;font-weight:800;line-height:1;}

#date{color:var(--gold);font-size:2rem;font-weight:700;text-transform:uppercase;}

main{
height:74vh;display:grid;
grid-template-columns:1fr 1.3fr;
gap:20px;padding:20px;box-sizing:border-box;
}

.card{
background:var(--accent);
border-radius:24px;
overflow:hidden;
}

.right-col{display:flex;flex-direction:column;gap:20px;}

.video-box{flex:4;background:#000;}

.bottom-split{
flex:1.2;display:grid;
grid-template-columns:1fr 1fr;gap:20px;
}

.info-panel{
padding:18px 25px;background:#fff;color:#1e293b;
}

#news-bar{
height:8vh;background:var(--gold);
display:flex;align-items:center;color:#000;
}

.ticker-label{
background:var(--navy);color:#fff;
padding:0 30px;height:100%;
display:flex;align-items:center;
font-weight:900;
}

.marquee-container{flex:1;overflow:hidden;}

.marquee{
white-space:nowrap;font-size:2rem;font-weight:800;
display:inline-block;padding-left:100%;
animation:scroll 35s linear infinite;
}

@keyframes scroll{
from{transform:translateX(0);}
to{transform:translateX(-100%);}
}

img,iframe{width:100%;height:100%;border:none;object-fit:cover;}
</style>
</head>

<body>

<header>
<div class="school-name">
Invictus International School<br>
<span style="color:var(--gold);font-size:3rem;">Horizon Hills</span>
</div>

<div>
<div id="time">00:00:00</div>
<div id="date">Loading...</div>
</div>
</header>

<main>

<!-- IMAGE SLIDESHOW -->
<div class="card">
<img id="slideshow">
</div>

<!-- RIGHT SIDE -->
<div class="right-col">

<!-- YOUTUBE PLAYER -->
<div class="card video-box">
<iframe id="yt"
src=""
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>

<!-- INFO -->
<div class="bottom-split">

<div class="info-panel" style="background:#f59e0b;color:#000;">
<h2>CAMPUS UPDATES</h2>
<div id="notices"></div>
</div>

<div class="info-panel" style="background:#0f172a;color:#fff;">
<h2 style="color:#f59e0b;">HIGHLIGHTS</h2>
<div id="highlights"></div>
</div>

</div>

</div>
</main>

<div id="news-bar">
<div class="ticker-label">BULLETIN</div>
<div class="marquee-container">
<div id="bulletin" class="marquee">Loading...</div>
</div>
</div>

<script>

const API_URL = "YOUR_GOOGLE_SCRIPT_URL";

let slideIndex = 0;
let videoIndex = 0;

let slideTimer;
let videoTimer;

async function load() {

const res = await fetch(API_URL);
const data = await res.json();


// --------------------
// SLIDESHOW
// --------------------
if(data.images?.length){

const img = document.getElementById("slideshow");

img.src = data.images[0];

clearInterval(slideTimer);

slideTimer = setInterval(()=>{
slideIndex = (slideIndex+1)%data.images.length;
img.src = data.images[slideIndex];
},5000);
}


// --------------------
// YOUTUBE (FIXED)
// --------------------
if(data.videos?.length){

const yt = document.getElementById("yt");

function playVideo(i){

const id = data.videos[i];

yt.src =
`https://www.youtube.com/embed/${id}?autoplay=1&mute=1&rel=0&controls=0&loop=1&playlist=${id}`;
}

playVideo(videoIndex);

clearInterval(videoTimer);

videoTimer = setInterval(()=>{

videoIndex = (videoIndex+1)%data.videos.length;
playVideo(videoIndex);

},60000);
}


// --------------------
// TEXT
// --------------------
document.getElementById("notices").innerHTML =
(data.notices||[]).map(x=>"▶ "+x).join("<br>");

document.getElementById("highlights").innerHTML =
(data.highlights||[]).map(x=>"★ "+x).join("<br>");

document.getElementById("bulletin").innerText =
data.bulletin || "Welcome";

}

// CLOCK
setInterval(()=>{
const d = new Date();
document.getElementById("time").innerText = d.toLocaleTimeString();
document.getElementById("date").innerText = d.toDateString();
},1000);

load();
setInterval(load,300000);

</script>

</body>
</html>
